version: 2
updates:
- package-ecosystem: gomod
  directory: /
  ignore:
    - dependency-name: "go"
      versions: ["> 1.25"]
  groups:
    all-go-deps:
      patterns:
        - "*"
  schedule:
    interval: weekly

- package-ecosystem: github-actions
  directory: /
  groups:
    all-gha-deps:
      patterns:
        - "*"
  schedule:
    interval: weekly
